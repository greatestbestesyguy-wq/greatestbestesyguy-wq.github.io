<!DOCTYPE html>
<html lang="en">
<head>
    <title id="page-title">Recycle St. Louis | Map</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="title" id="meta-title" content="">
    <meta name="description" id="meta-desc" content="">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stl.planet-recycling.pl/">
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-desc" content="">
    <meta property="og:image" content="https://stl.planet-recycling.pl/images/screenshot.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://stl.planet-recycling.pl/">
    <meta property="twitter:title" id="tw-title" content="">
    <meta property="twitter:description" id="tw-desc" content="">
    <meta property="twitter:image" content="https://stl.planet-recycling.pl/images/screenshot.png">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R1Y5DRSP21"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-R1Y5DRSP21');
    </script>

    <link rel="stylesheet" href="style.css">
    <style>
        .map-container {
            width: 100%;
            height: 70vh;
            background-color: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #222;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .map-info {
            max-width: 800px;
            margin: 0 auto 60px;
            text-align: left;
        }

        .map-info h3 {
            color: var(--text);
            margin-bottom: 10px;
        }

        .map-info p {
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="header-placeholder"></div>

        <main>
            <h1 id="map-page-title"></h1>
            <p id="map-tagline" class="tagline"></p>

            <div class="map-container">
                <iframe 
                    id="map-iframe"
                    src="" 
                    title="St. Louis City Recycling Map"
                    allow="geolocation">
                </iframe>
            </div>

            <div class="map-info">
                <h3 id="instruction-title"></h3>
                <p id="instruction-text"></p>
            </div>
        </main>

        <div id="footer-placeholder"></div>
    </div>

    <script src="script.js"></script>
    <script>
        async function loadMapData() {
            try {
                const response = await fetch('./content.json');
                const data = await response.json();
                const m = data.mapPage;

                // Meta & Social
                document.title = m.pageTitle;
                document.getElementById('meta-title').content = m.metaTitle;
                document.getElementById('meta-desc').content = m.metaDescription;
                document.getElementById('og-title').content = m.metaTitle;
                document.getElementById('og-desc').content = m.metaDescription;
                document.getElementById('tw-title').content = m.metaTitle;
                document.getElementById('tw-desc').content = m.metaDescription;

                // Page Content
                document.getElementById('map-page-title').innerText = m.title;
                document.getElementById('map-tagline').innerText = m.tagline;
                document.getElementById('map-iframe').src = m.mapUrl;
                document.getElementById('instruction-title').innerText = m.instructionsTitle;
                document.getElementById('instruction-text').innerText = m.instructionsBody;

            } catch (error) {
                console.error("Error loading Map JSON content:", error);
            }
        }

        loadMapData();
    </script>
</body>
</html>
