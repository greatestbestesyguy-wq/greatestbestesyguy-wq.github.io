<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recycle STL | Ultimate Studio</title>
    <style>
        :root { --bg: #09090b; --surface: #18181b; --border: #27272a; --accent: #10b981; --accent-hover: #059669; --text: #f4f4f5; --text-dim: #a1a1aa; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Setup Screen */
        #setup-screen { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; text-align: center; }
        .setup-box { max-width: 600px; width: 100%; }
        .setup-box h1 { margin-bottom: 10px; font-size: 2.5rem; color: var(--accent); }
        .setup-box p { color: var(--text-dim); margin-bottom: 25px; font-size: 1.1rem; }
        textarea.json-loader { width: 100%; height: 300px; background: var(--surface); border: 2px dashed var(--border); border-radius: 16px; color: var(--accent); font-family: 'Courier New', monospace; padding: 25px; resize: none; transition: all 0.3s; font-size: 14px; }
        textarea.json-loader:focus { outline: none; border-color: var(--accent); background: #1c1c21; }
        
        /* Main Layout */
        #editor-screen { display: none; flex: 1; flex-direction: column; height: 100vh; }
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-weight: 800; letter-spacing: 1px; font-size: 1.2rem; }
        .logo span { color: var(--accent); }
        select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; outline: none; cursor: pointer; font-size: 14px; }
        
        .header-right { display: flex; gap: 12px; }
        .btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-weight: 500; }
        .btn:hover { background: var(--border); transform: translateY(-1px); }
        .btn-primary { background: var(--accent); color: #000; border: none; font-weight: 700; }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 6px 10px; font-size: 12px; }
        .btn-danger:hover { background: var(--danger); color: white; }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 480px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.2); z-index: 10; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 25px; }
        
        /* Form Controls */
        .field-group { margin-bottom: 24px; }
        .field-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        input[type="text"], input[type="url"], textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 14px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus, textarea:focus { border-color: var(--accent); }
        textarea { height: 120px; resize: vertical; line-height: 1.5; }
        
        /* Array/Section Blocks */
        .array-item { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; position: relative; }
        .array-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .array-item-title { font-size: 13px; font-weight: bold; color: var(--accent); letter-spacing: 0.5px; }

        /* Preview Area */
        .preview-area { flex: 1; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 40px; }
        .device-toggle { position: absolute; top: 25px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; overflow: hidden; z-index: 20; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .device-toggle button { background: transparent; color: var(--text-dim); border: none; padding: 10px 20px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .device-toggle button.active { background: var(--border); color: var(--text); }
        
        .iframe-container { width: 100%; height: 100%; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: white; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Export Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 650px; max-width: 90%; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .modal h2 { margin-bottom: 15px; color: var(--accent); font-size: 1.8rem; }
        .modal p { color: var(--text-dim); margin-bottom: 25px; line-height: 1.6; }
        .modal textarea { height: 350px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--accent); font-family: monospace; font-size: 12px; padding: 20px; margin-bottom: 25px; width: 100%; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }

        h3 { font-size: 14px; color: var(--text); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        h3::before { content: ''; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h1>Studio <span>Setup</span></h1>
            <p>Paste your <strong>content.json</strong> to enter the editor.</p>
            <textarea id="json-loader" class="json-loader" placeholder='{ "metadata": { ... } }' autofocus></textarea>
        </div>
    </div>

    <div id="editor-screen">
        <header>
            <div class="header-left">
                <div class="logo">RECYCLE<span>STL</span></div>
                <select id="page-selector" onchange="switchPage(this.value)">
                    <option value="home">Home Settings</option>
                    <option value="map">Map Settings</option>
                    <option value="interviews">Interview Settings</option>
                    <option value="about">About Settings</option>
                    <option value="quiz">Quiz Settings</option>
                </select>
            </div>
            <div class="header-right">
                <button class="btn" onclick="reloadPreview()">↻ Reload Live Site</button>
                <button class="btn btn-primary" onclick="openGitHubModal()">⚡ Export & GitHub</button>
            </div>
        </header>

        <div class="workspace">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2 id="sidebar-title" style="font-size: 1.2rem;">Editing Home</h2>
                    <p style="font-size: 12px; color: var(--text-dim); margin-top: 6px;">Fields below update the site instantly.</p>
                </div>
                <div class="sidebar-content" id="form-container">
                    </div>
            </aside>

            <section class="preview-area">
                <div class="device-toggle">
                    <button id="btn-desktop" class="active" onclick="setDevice('desktop')">Desktop</button>
                    <button id="btn-mobile" onclick="setDevice('mobile')">Mobile</button>
                </div>
                <div class="iframe-container" id="iframe-wrap">
                    <iframe id="preview-frame" src="https://stl.planet-recycling.pl/"></iframe>
                </div>
            </section>
        </div>
    </div>

    <div id="github-modal" class="modal-overlay">
        <div class="modal">
            <h2>Ready to Publish!</h2>
            <p>Your updated configuration is ready. Copy the code below, then click the button to open GitHub and update your file.</p>
            <textarea id="export-json" readonly></textarea>
            <div class="modal-actions">
                <button class="btn" onclick="closeGitHubModal()">Cancel</button>
                <button class="btn" onclick="copyJSON()">📋 Copy JSON</button>
                <a href="https://github.com/greatestbestesyguy-wq/greatestbestesyguy-wq.github.io/blob/main/content.json" target="_blank" class="btn btn-primary" onclick="closeGitHubModal()">↗ Open GitHub Repo</a>
            </div>
        </div>
    </div>

    <script>
        let db = null;
        let currentPage = 'home';

        // --- AUTO-LOADER ---
        document.getElementById('json-loader').addEventListener('input', function(e) {
            try {
                db = JSON.parse(e.target.value);
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('editor-screen').style.display = 'flex';
                switchPage('home');
            } catch(err) { /* Waiting for valid JSON */ }
        });

        const pageConfigs = {
            home: { title: 'Home Page' },
            map: { title: 'Map Page' },
            interviews: { title: 'Interviews' },
            about: { title: 'About Page' },
            quiz: { title: 'Quiz Application' }
        };

        function switchPage(pageKey) {
            currentPage = pageKey;
            document.getElementById('sidebar-title').innerText = `Editing ${pageConfigs[pageKey].title}`;
            document.getElementById('page-selector').value = pageKey;
            renderForm();
        }

        function reloadPreview() {
            document.getElementById('preview-frame').src = "https://stl.planet-recycling.pl/";
            setTimeout(syncIframe, 800);
        }

        function setDevice(type) {
            document.getElementById('btn-desktop').classList.toggle('active', type === 'desktop');
            document.getElementById('btn-mobile').classList.toggle('active', type === 'mobile');
            document.getElementById('iframe-wrap').style.width = type === 'mobile' ? '375px' : '100%';
        }

        // --- FORM ENGINE ---
        function renderForm() {
            const container = document.getElementById('form-container');
            let html = '';

            const input = (label, path, type = 'text') => {
                const val = getPath(db, path);
                const isArea = type === 'area';
                return `
                    <div class="field-group">
                        <label>${label}</label>
                        ${isArea 
                            ? `<textarea oninput="updateData('${path}', this.value)">${val}</textarea>`
                            : `<input type="text" value="${val}" oninput="updateData('${path}', this.value)">`
                        }
                    </div>`;
            };

            if (currentPage === 'home') {
                html += `<h3>Metadata</h3>${input('Page Title', 'metadata.pageTitle')}${input('Description', 'metadata.metaDescription')}`;
                html += `<hr style="border:0; border-top:1px solid var(--border); margin:25px 0;">`;
                html += `<h3>Hero Section</h3>${input('Headline', 'hero.title')}${input('Tagline', 'hero.tagline')}`;
                html += `<hr style="border:0; border-top:1px solid var(--border); margin:25px 0;">`;
                html += `<h3>Article</h3>${input('Article Header', 'article.title')}${input('Body Text', 'article.body', 'area')}`;
                html += renderArray('stats', 'Stats & Cards', ['value', 'label']);
            } 
            else if (currentPage === 'map') {
                html += `<h3>Map Settings</h3>${input('Main Title', 'mapPage.title')}${input('Map URL (Embed)', 'mapPage.mapUrl')}`;
                html += `<hr style="border:0; border-top:1px solid var(--border); margin:25px 0;">`;
                html += `<h3>Instructions</h3>${input('Title', 'mapPage.instructionsTitle')}${input('Body', 'mapPage.instructionsBody', 'area')}`;
            }
            else if (currentPage === 'interviews') {
                html += `<h3>Header</h3>${input('Page Headline', 'interviewsPage.title')}${input('YouTube Embed', 'interviewsPage.featuredVideoUrl')}`;
                html += renderArray('interviewsPage.entries', 'Interview Entries', ['label', 'title', 'description']);
            }
            else if (currentPage === 'about') {
                html += `<h3>Mission Statement</h3>${input('Title', 'aboutPage.title')}${input('Mission Text', 'aboutPage.missionBody', 'area')}`;
                html += `<hr style="border:0; border-top:1px solid var(--border); margin:25px 0;">`;
                html += `<h3>Project Details</h3>${input('Course', 'aboutPage.contextCourse')}${input('Date', 'aboutPage.contextDate')}`;
                html += renderArray('aboutPage.team', 'Team Members', ['name', 'role']);
            }
            else if (currentPage === 'quiz') {
                html += `<h3>Header</h3>${input('Header Text', 'quizPage.pageTitle')}`;
                html += renderArray('quizPage.questions', 'Quiz Questions', ['q', 'a', 'info']);
            }

            container.innerHTML = html;
        }

        // --- ARRAY ENGINE ---
        function renderArray(path, title, fields) {
            const arr = getPath(db, path) || [];
            let html = `<hr style="border:0; border-top:1px solid var(--border); margin:25px 0;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <h3>${title}</h3>
                            <button class="btn btn-primary" style="padding: 5px 12px; font-size: 11px;" onclick="addArrayItem('${path}', '${fields.join(',')}')">+ Add</button>
                        </div>`;
            
            arr.forEach((item, index) => {
                html += `<div class="array-item">
                            <div class="array-item-header">
                                <span class="array-item-title">#${index + 1} ${fields[0].toUpperCase()}</span>
                                <button class="btn-danger" onclick="removeArrayItem('${path}', ${index})">×</button>
                            </div>`;
                fields.forEach(field => {
                    const isArea = field === 'description' || field === 'info' || field === 'body';
                    html += `<div class="field-group">
                                <label>${field}</label>
                                ${isArea 
                                    ? `<textarea oninput="updateData('${path}.${index}.${field}', this.value)">${item[field] || ''}</textarea>`
                                    : `<input type="text" value="${item[field] || ''}" oninput="updateData('${path}.${index}.${field}', this.value)">`
                                }
                             </div>`;
                });
                html += `</div>`;
            });
            return html;
        }

        function addArrayItem(path, fieldsStr) {
            const fields = fieldsStr.split(',');
            const newObj = {};
            fields.forEach(f => newObj[f] = f === 'a' ? 'Yes' : '');
            const arr = getPath(db, path);
            arr.push(newObj);
            renderForm();
            syncIframe();
        }

        function removeArrayItem(path, index) {
            if(confirm('Delete this entry?')) {
                const arr = getPath(db, path);
                arr.splice(index, 1);
                renderForm();
                syncIframe();
            }
        }

        // --- DATA SYNC ---
        function getPath(obj, path) {
            return path.split('.').reduce((o, i) => (o ? o[i] : null), obj);
        }

        function updateData(path, val) {
            const keys = path.split('.');
            let obj = db;
            for (let i = 0; i < keys.length - 1; i++) { obj = obj[keys[i]]; }
            obj[keys[keys.length - 1]] = val;
            syncIframe();
        }

        function syncIframe() {
            const frame = document.getElementById('preview-frame').contentWindow;
            frame.postMessage({ type: 'UPDATE_CONTENT', data: db }, 'https://stl.planet-recycling.pl');
        }

        // --- MODALS ---
        function openGitHubModal() {
            document.getElementById('export-json').value = JSON.stringify(db, null, 2);
            document.getElementById('github-modal').style.display = 'flex';
        }

        function closeGitHubModal() { document.getElementById('github-modal').style.display = 'none'; }

        function copyJSON() {
            const text = document.getElementById('export-json').value;
            navigator.clipboard.writeText(text);
            alert("Code Copied! Now paste it on GitHub.");
        }
    </script>
</body>
</html>
