<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle STL | High-Fidelity CMS</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #00ff88;
            --text: #ffffff;
            --dim: #a0a0a0;
            --wrong: #ff4444;
            --border: #222;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000; color: #fff;
            height: 100vh; overflow: hidden;
        }

        /* Screen 1: Entry */
        #entry-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: var(--bg); z-index: 1000; position: absolute; width: 100%;
        }
        .entry-container { width: 90%; max-width: 600px; text-align: center; }
        
        /* Screen 2: Workspace */
        #workspace { display: none; height: 100vh; flex-direction: column; }
        
        header { 
            padding: 15px 25px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .layout { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 380px; background: #0f0f0f; border-right: 1px solid var(--border); overflow-y: auto; }
        .tab-bar { display: flex; border-bottom: 1px solid var(--border); background: #000; }
        .tab { 
            flex: 1; padding: 12px; text-align: center; font-size: 11px; cursor: pointer;
            color: #666; border-bottom: 2px solid transparent; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: #111; }

        .editor-content { padding: 25px; }
        .field { margin-bottom: 25px; }
        .field label { display: block; font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
        .field input, .field textarea {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; box-sizing: border-box; outline: none;
        }
        .field input:focus, .field textarea:focus { border-color: var(--accent); }
        .field textarea { height: 120px; resize: none; }

        /* Preview */
        .preview-pane { flex: 1; background: #050505; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .site-mockup {
            width: 100%; max-width: 800px; background: var(--bg); min-height: 100%;
            border-radius: 20px; padding: 40px; color: var(--text);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8); position: relative;
        }

        /* Buttons */
        .btn {
            background: var(--accent); color: #000; border: none; padding: 12px 24px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;
            text-decoration: none; display: inline-block;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
        .btn-github { background: #333; color: #fff; margin-bottom: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; }

        .status-msg { font-size: 13px; color: var(--accent); font-weight: bold; margin-right: 15px; opacity: 0; transition: 0.3s; }
        .status-msg.visible { opacity: 1; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <div class="entry-container">
            <h1 style="color: var(--accent); font-size: 2.5rem; margin-bottom: 10px;">Recycle STL Manager</h1>
            <p style="color: var(--dim); margin-bottom: 30px;">Update your site content without touching code.</p>
            
            <a href="https://github.com/greatestbestesyguy-wq/greatestbestesyguy-wq.github.io/blob/main/content.json" target="_blank" class="btn btn-github" style="width:100%; box-sizing:border-box;">1. Open GitHub & Copy Content</a>
            
            <textarea id="json-input" style="width:100%; height:200px; background:#111; border:1px solid var(--border); border-radius:12px; color:var(--accent); padding:15px; font-family:monospace; margin-top:10px;" placeholder="Paste the JSON here..."></textarea>
            
            <div id="entry-error" style="color:var(--wrong); margin:10px 0; font-size:14px; height:20px;"></div>
            
            <button class="btn" style="width:100%;" onclick="startEditor()">2. Enter Workspace</button>
        </div>
    </div>

    <div id="workspace">
        <header>
            <div style="font-weight: bold; font-size: 1.2rem; letter-spacing: -1px;">RECYCLE <span style="color:var(--accent)">STL</span> CMS</div>
            <div style="display:flex; align-items:center;">
                <span id="save-status" class="status-msg">JSON COPIED!</span>
                <button class="btn" onclick="copyJSON()">Copy for GitHub</button>
                <a href="https://github.com/greatestbestesyguy-wq/greatestbestesyguy-wq.github.io/blob/main/content.json" target="_blank" class="btn btn-outline" style="margin-left:10px;">Go to GitHub</a>
            </div>
        </header>

        <div class="layout">
            <div class="sidebar">
                <div class="tab-bar">
                    <div class="tab active" onclick="setTab('home', event)">Home</div>
                    <div class="tab" onclick="setTab('map', event)">Map</div>
                    <div class="tab" onclick="setTab('quiz', event)">Quiz</div>
                    <div class="tab" onclick="setTab('about', event)">About</div>
                </div>
                <div class="editor-content" id="editor-fields"></div>
            </div>

            <div class="preview-pane">
                <div class="site-mockup" id="site-sim"></div>
            </div>
        </div>
    </div>

    <script>
        let db = {};
        let activeTab = 'home';

        function startEditor() {
            const raw = document.getElementById('json-input').value;
            if(!raw.trim()) return;
            try {
                db = JSON.parse(raw);
                document.getElementById('entry-screen').style.display = 'none';
                document.getElementById('workspace').style.display = 'flex';
                render();
            } catch (e) {
                document.getElementById('entry-error').innerText = "Invalid JSON. Please copy the whole file.";
            }
        }

        function setTab(tab, e) {
            activeTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            render();
        }

        function update(path, val) {
            const keys = path.split('.');
            let obj = db;
            for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
            obj[keys[keys.length - 1]] = val;
            renderPreview();
        }

        function render() {
            const container = document.getElementById('editor-fields');
            container.innerHTML = '';
            
            const schema = {
                home: [
                    { label: 'Hero Title', path: 'hero.title' },
                    { label: 'Hero Tagline', path: 'hero.tagline', type: 'textarea' },
                    { label: 'Article Title', path: 'article.title' },
                    { label: 'Article Body', path: 'article.body', type: 'textarea' },
                    { label: 'Popup Message', path: 'popup.message', type: 'textarea' }
                ],
                map: [
                    { label: 'Page Title', path: 'mapPage.title' },
                    { label: 'Tagline', path: 'mapPage.tagline' },
                    { label: 'Map Link (src)', path: 'mapPage.mapUrl' }
                ],
                quiz: [
                    { label: 'Quiz Page Title', path: 'quizPage.pageTitle' }
                ],
                about: [
                    { label: 'Mission Title', path: 'aboutPage.missionTitle' },
                    { label: 'Mission HTML Content', path: 'aboutPage.missionBody', type: 'textarea' }
                ]
            };

            schema[activeTab].forEach(f => {
                const val = f.path.split('.').reduce((o, k) => o[k], db) || "";
                const fieldHTML = `
                    <div class="field">
                        <label>${f.label}</label>
                        ${f.type === 'textarea' 
                            ? `<textarea oninput="update('${f.path}', this.value)">${val}</textarea>` 
                            : `<input type="text" value="${val}" oninput="update('${f.path}', this.value)">`}
                    </div>`;
                container.insertAdjacentHTML('beforeend', fieldHTML);
            });
            renderPreview();
        }

        function renderPreview() {
            const sim = document.getElementById('site-sim');
            if (activeTab === 'home') {
                sim.innerHTML = `
                    <div style="background:rgba(0,255,136,0.1); border:1px dashed var(--accent); padding:15px; border-radius:10px; font-size:13px; margin-bottom:30px;">${db.popup.message}</div>
                    <h1 style="font-size: 3.5rem; margin: 0; line-height:1;">${db.hero.title}</h1>
                    <p style="color: var(--dim); font-size: 1.1rem; margin-top:15px;">${db.hero.tagline}</p>
                    <div style="margin-top: 60px;">
                        <h2 style="font-size: 2rem;">${db.article.title}</h2>
                        <p style="color: var(--dim); line-height:1.7;">${db.article.body}</p>
                    </div>
                `;
            } else if (activeTab === 'map') {
                sim.innerHTML = `
                    <h1 style="text-align:center; font-size:2.5rem;">${db.mapPage.title}</h1>
                    <p style="text-align:center; color: var(--dim);">${db.mapPage.tagline}</p>
                    <div style="height: 350px; width:100%; border-radius:24px; background:#111; display:flex; align-items:center; justify-content:center; margin-top:30px; border:1px solid var(--border); color:var(--dim); font-size:12px;">
                        [GOOGLE MAPS EMBED: ${db.mapPage.mapUrl}]
                    </div>
                `;
            } else if (activeTab === 'about') {
                sim.innerHTML = `
                    <h1 style="font-size:2.5rem;">About the Project</h1>
                    <h2 style="color: var(--accent); margin-top:40px;">${db.aboutPage.missionTitle}</h2>
                    <div style="color:var(--dim); line-height:1.6;">${db.aboutPage.missionBody}</div>
                `;
            } else {
                sim.innerHTML = `<h1 style="text-align:center;">${db.quizPage.pageTitle}</h1>`;
            }
        }

        function copyJSON() {
            const out = JSON.stringify(db, null, 2);
            navigator.clipboard.writeText(out);
            const msg = document.getElementById('save-status');
            msg.classList.add('visible');
            setTimeout(() => msg.classList.remove('visible'), 2500);
        }
    </script>
</body>
</html>
