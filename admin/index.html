<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle STL | Content Editor</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #00ff88;
            --text: #ffffff;
            --border: #333;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .editor-pane, .preview-pane {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .preview-pane {
            background: #0f0f0f;
            border-left: 1px solid var(--border);
        }
        textarea {
            width: 100%;
            height: 100%;
            background: #111;
            color: #00ff88;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            resize: none;
            outline: none;
        }
        .btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-copy { background: white; margin-left: 10px; }
        
        .instructions {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        pre {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; color:var(--accent);">Recycle STL Content Manager</h2>
    <div>
        <button class="btn btn-copy" onclick="copyToClipboard()">📋 Copy Finished JSON</button>
    </div>
</header>

<div class="main-container">
    <div class="editor-pane">
        <div class="instructions">
            <strong>How to update your site:</strong>
            <ol>
                <li>Paste the current text from your <code>content.json</code> file below.</li>
                <li>Edit the text (be careful not to delete quotes <code>"</code> or commas <code>,</code>).</li>
                <li>Click <strong>Copy Finished JSON</strong> and paste it back into GitHub.</li>
            </ol>
        </div>
        <textarea id="json-input" placeholder="Paste your content.json here..." oninput="updatePreview()"></textarea>
    </div>

    <div class="preview-pane" id="preview-content">
        <p style="color: #666;">Waiting for valid JSON input...</p>
    </div>
</div>

<script>
    function updatePreview() {
        const input = document.getElementById('json-input').value;
        const preview = document.getElementById('preview-content');

        try {
            const data = JSON.parse(input);
            preview.innerHTML = `
                <h3 style="color:var(--accent)">Live Data Structure</h3>
                <div style="background:var(--card); padding:15px; border-radius:10px; border:1px solid #333;">
                    <p><strong>Home Title:</strong> ${data.hero.title}</p>
                    <p><strong>Pop-up Active:</strong> ${data.popup.enabled ? '✅ Yes' : '❌ No'}</p>
                    <hr border="0" style="border-top:1px solid #333">
                    <p><strong>Map URL:</strong> <code style="color:#888">${data.mapPage.mapUrl}</code></p>
                    <p><strong>Quiz Questions:</strong> ${data.quizPage.questions.length} total</p>
                </div>
                <p style="font-size:12px; margin-top:20px; color:var(--accent);">✓ JSON is Valid</p>
            `;
        } catch (e) {
            preview.innerHTML = `<p style="color: #ff4444;">⚠️ Invalid JSON: ${e.message}</p>`;
        }
    }

    function copyToClipboard() {
        const textarea = document.getElementById('json-input');
        textarea.select();
        document.execCommand('copy');
        alert("JSON copied to clipboard! Now go to your content.json file on GitHub, click the 'Pencil' icon (Edit), select all text, paste this over it, and click 'Commit changes'.");
    }
</script>

</body>
</html>
