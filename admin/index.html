<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recycle STL | Pixel-Perfect Editor</title>
    <style>
        :root { --bg: #050505; --accent: #00ff88; --border: #222; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 15px; background: #000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .layout { display: flex; flex: 1; }
        
        /* Editor Side */
        .editor { width: 400px; background: #0f0f0f; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; }
        .field { margin-bottom: 20px; }
        label { color: var(--accent); font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 5px; padding: 10px; color: white; box-sizing: border-box; }

        /* Real Website Side */
        .preview { flex: 1; background: #222; position: relative; display: flex; flex-direction: column; }
        .address-bar { background: #333; padding: 5px 15px; font-size: 12px; color: #ccc; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; background: white; }

        .btn { background: var(--accent); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold">PIXEL-PERFECT <span style="color:var(--accent)">PREVIEW</span></div>
    <div>
        <button class="btn" onclick="exportJSON()">Copy JSON for GitHub</button>
        <a href="https://github.com/greatestbestesyguy-wq/greatestbestesyguy-wq.github.io/blob/main/content.json" target="_blank" class="btn" style="background:#444; color:white; margin-left:10px;">Open GitHub</a>
    </div>
</header>

<div class="layout">
    <div class="editor" id="fields">
        <p style="color:#888; font-size: 13px;">Paste your JSON in the box below to begin.</p>
        <textarea id="raw-input" style="height: 200px;" placeholder="Paste content.json here..."></textarea>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="loadInitialJSON()">Load Content</button>
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <div id="dynamic-fields"></div>
    </div>

    <div class="preview">
        <div class="address-bar">Previewing: https://stl.planet-recycling.pl/</div>
        <iframe id="site-frame" src="https://stl.planet-recycling.pl/"></iframe>
    </div>
</div>

<script>
    let db = {};

    function loadInitialJSON() {
        try {
            db = JSON.parse(document.getElementById('raw-input').value);
            renderFields();
            sync();
        } catch(e) { alert("Invalid JSON!"); }
    }

    function renderFields() {
        const container = document.getElementById('dynamic-fields');
        container.innerHTML = '<h3>Edit Home Page</h3>';
        
        // Setup fields for Home Page
        const homeFields = [
            { l: 'Hero Title', p: 'hero.title' },
            { l: 'Hero Tagline', p: 'hero.tagline' },
            { l: 'Article Body', p: 'article.body', t: 'area' }
        ];

        homeFields.forEach(f => {
            const val = f.p.split('.').reduce((o, i) => o[i], db);
            container.innerHTML += `
                <div class="field">
                    <label>${f.l}</label>
                    ${f.t === 'area' 
                        ? `<textarea oninput="update('${f.p}', this.value)">${val}</textarea>`
                        : `<input type="text" value="${val}" oninput="update('${f.p}', this.value)">`}
                </div>`;
        });
    }

    function update(path, val) {
        const keys = path.split('.');
        let obj = db;
        for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
        obj[keys[keys.length - 1]] = val;
        sync();
    }

    function sync() {
        // Send the updated data to the iframe
        const frame = document.getElementById('site-frame').contentWindow;
        frame.postMessage({ type: 'UPDATE_CONTENT', data: db }, '*');
    }

    function exportJSON() {
        navigator.clipboard.writeText(JSON.stringify(db, null, 2));
        alert("JSON Copied! Now paste it into GitHub.");
    }
</script>

</body>
</html>
