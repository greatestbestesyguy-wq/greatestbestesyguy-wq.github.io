backend:
  name: git-gateway
  branch: main # Change this to 'master' if your GitHub branch is master

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Main Title", name: "title", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Stats: Curbside", name: "stat_curbside", widget: "string" }
          - { label: "Stats: Locations", name: "stat_locations", widget: "string" }
          - { label: "Crisis Content", name: "body", widget: "markdown" }
