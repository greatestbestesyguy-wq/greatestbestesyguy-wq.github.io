<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R1Y5DRSP21"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-R1Y5DRSP21');
    </script>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Recycle St. Louis</title>
    
    <link rel="stylesheet" href="./style.css">

    <meta name="title" id="meta-title" content="">
    <meta name="description" id="meta-desc" content="">

    <style>
        /* HACKER TERMINAL STYLES */
        #hacker-terminal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 10, 0, 0.95);
            z-index: 9999;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 40px;
            overflow: hidden;
            border: 4px solid #050;
        }

        .terminal-header { border-bottom: 2px solid #050; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .terminal-header span { font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 255, 0, 0.1); position: absolute;
            top: 0; left: 0; pointer-events: none; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .admin-links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .admin-links a, .admin-links button {
            background: transparent; border: 1px solid #0f0; color: #0f0; padding: 12px;
            text-decoration: none; text-align: left; cursor: pointer; font-family: monospace;
            transition: 0.2s; max-width: 400px;
        }
        .admin-links a:hover, .admin-links button:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }

        #code-scroll {
            position: absolute; right: 40px; top: 80px; width: 45%; height: 80vh;
            color: rgba(0, 255, 0, 0.4); font-size: 11px; white-space: pre;
            overflow: hidden; border-left: 1px solid #050; padding-left: 20px;
        }

        .close-terminal { color: #0f0; background: none; border: none; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="hacker-terminal">
        <div class="scanline"></div>
        <div class="terminal-header">
            <span>[ SYSTEM OVERRIDE: AUTHORIZED ACCESS ]</span>
            <button class="close-terminal" onclick="toggleTerminal(false)">&times;</button>
        </div>

        <div id="terminal-content">
            <p>> root@recycle-stl:~# access_granted</p>
            <p>> initializing admin_panel_v3.0...</p>
            
            <div class="admin-links">
                <a href="/admin/test">> 📂 VIEW TEST PAGE</a>
                <a href="/admin">> ⚡ OPEN ADMIN STUDIO</a>
                <a href="https://github.com/greatestbestesyguy-wq/greatestbestesyguy-wq.github.io" target="_blank">> 🛠 GITHUB REPOSITORY</a>
                <button onclick="startHackerTyper()">> 💾 INITIALIZE DECRYPTION SEQUENCER</button>
            </div>
        </div>

        <div id="code-scroll"></div>
    </div>

    <div id="popup-notif" style="display:none;">
        <button class="close-notif" onclick="closePopup()">&times;</button>
        <div id="popup-content"></div>
    </div>

    <div class="container">
        <div id="header-placeholder"></div>

        <main id="main-content">
            <h1 id="hero-title"></h1>
            <p id="hero-tagline" class="tagline"></p>

            <div id="stats-grid" class="stats-grid"></div>

            <section id="interview-container" class="interview-section" style="display:none;">
                <div id="interview-img" class="interview-img"></div>
                <div class="interview-content">
                    <span id="interview-label" style="color:var(--accent); font-weight:bold; text-transform:uppercase; font-size:12px;"></span>
                    <h3 id="interview-title"></h3>
                    <p id="interview-text"></p>
                    <a id="interview-link" href="" class="btn-play"></a>
                </div>
            </section>

            <section id="article-section" style="max-width:700px; margin: 0 auto 80px;">
                <h3 id="article-title"></h3>
                <p id="article-body"></p>
            </section>
        </main>

        <div id="footer-placeholder"></div>
    </div>

    <script src="./script.js"></script>
    <script>
        // --- ADMIN SEQUENCE LOGIC ---
        let inputString = "";
        window.addEventListener("keydown", (e) => {
            inputString += e.key.toLowerCase();
            if (inputString.length > 10) inputString = inputString.substring(1);
            
            if (inputString.endsWith("admin")) {
                toggleTerminal(true);
                inputString = "";
            }
        });

        function toggleTerminal(show) {
            document.getElementById('hacker-terminal').style.display = show ? 'block' : 'none';
        }

        function startHackerTyper() {
            const codeBox = document.getElementById('code-scroll');
            const codeSnippets = [
                "import os\nimport sys\n# Bypassing firewall...",
                "def init_hack(ip):\n  return 'SUCCESS' if ping(ip) else 'FAIL'",
                "GET /admin/v3/config HTTP/1.1\nHost: planet-recycling.pl",
                "01001000 01100001 01100011 01101011",
                "const db = connect('stl_prod');\ndb.users.find({ role: 'admin' });",
                "CRITICAL WARNING: HEURISTIC DETECTION ACTIVE",
                "sudo rm -rf /var/log/access_logs",
                "Packet injection successful at port 8080..."
            ];
            
            let i = 0;
            setInterval(() => {
                codeBox.innerText += "\n" + codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
                codeBox.scrollTop = codeBox.scrollHeight;
            }, 80);
        }

        // --- EXISTING CONTENT LOGIC ---
        function renderContent(data) {
            document.title = data.metadata.pageTitle;
            const metaTitle = document.getElementById('meta-title');
            const metaDesc = document.getElementById('meta-desc');
            if(metaTitle) metaTitle.content = data.metadata.metaTitle;
            if(metaDesc) metaDesc.content = data.metadata.metaDescription;

            const popup = document.getElementById('popup-notif');
            if (data.popup && data.popup.enabled) {
                const popupContent = document.getElementById('popup-content');
                if(popupContent) {
                    popupContent.innerHTML = `
                        <p>${data.popup.message}</p>
                        <a href="${data.popup.linkUrl}" class="popup-btn">${data.popup.linkText}</a>
                    `;
                }
                if(popup) popup.style.display = 'block';
            } else {
                if(popup) popup.style.display = 'none';
            }

            document.getElementById('hero-title').innerText = data.hero.title;
            document.getElementById('hero-tagline').innerText = data.hero.tagline;

            const statsGrid = document.getElementById('stats-grid');
            if(statsGrid) {
                statsGrid.innerHTML = ''; 
                data.stats.forEach(stat => {
                    const card = document.createElement('div');
                    card.className = 'stat-card';
                    card.innerHTML = `<h2>${stat.value}</h2><p>${stat.label}</p>`;
                    statsGrid.appendChild(card);
                });
            }

            const interviewContainer = document.getElementById('interview-container');
            if (data.interview && data.interview.visible) {
                if(interviewContainer) interviewContainer.style.display = 'grid';
                document.getElementById('interview-label').innerText = data.interview.label;
                document.getElementById('interview-title').innerText = data.interview.title;
                document.getElementById('interview-text').innerText = data.interview.description;
                const link = document.getElementById('interview-link');
                link.innerText = data.interview.buttonText;
                link.href = data.interview.link;
                const img = document.getElementById('interview-img');
                img.style.backgroundImage = `url('${data.interview.imageUrl}')`;
            } else {
                if(interviewContainer) interviewContainer.style.display = 'none';
            }

            document.getElementById('article-title').innerText = data.article.title;
            document.getElementById('article-body').innerText = data.article.body;
        }

        async function loadPageData() {
            try {
                const response = await fetch('./content.json');
                const data = await response.json();
                renderContent(data);
            } catch (error) {
                console.error("Error loading JSON content:", error);
            }
        }

        loadPageData();

        window.addEventListener('message', (event) => {
            if (event.data.type === 'UPDATE_CONTENT') {
                renderContent(event.data.data);
            }
        });

        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }

        function closePopup() {
            const popup = document.getElementById('popup-notif');
            if(popup) popup.style.display = 'none';
        }
    </script>
</body>
</html>
