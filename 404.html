<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Recycle STL</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #161616;
            border-top: 4px solid #39FF14;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div>
        <h1>404</h1>
        <p>This page doesn't exist yet!</p>
        <p>Redirecting you back to the Metro HS project...</p>
        <div class="loader"></div>
    </div>

    <script>
        // Store a "flag" in the browser session to show the popup on the home page
        sessionStorage.setItem('showRedirectPopup', 'true');

        // Wait 2 seconds so they can read the 404 message, then go home
        setTimeout(() => {
            window.location.href = 'index.html'; 
        }, 2000);
    </script>

</body>
</html>
