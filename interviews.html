<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R1Y5DRSP21"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-R1Y5DRSP21');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Recycle St. Louis | Interviews</title>
    
    <link rel="stylesheet" href="./style.css">

    <meta name="title" id="meta-title" content="">
    <meta name="description" id="meta-desc" content="">

    <style>
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .interview-list {
            display: grid;
            gap: 40px;
            margin-top: 60px;
        }
        .interview-entry {
            border-bottom: 1px solid #222;
            padding-bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="header-placeholder"></div>

        <main>
            <h1 id="interviews-title"></h1>
            <p id="interviews-tagline" class="tagline"></p>

            <div class="video-container" id="featured-video-wrap" style="display:none;">
                <iframe id="featured-video-iframe" src="" allowfullscreen></iframe>
            </div>

            <div id="interview-list" class="interview-list"></div>
        </main>

        <div id="footer-placeholder"></div>
    </div>

    <script src="./script.js"></script>
    <script>
        async function loadInterviews() {
            try {
                const response = await fetch('./content.json');
                const data = await response.json();
                const page = data.interviewsPage;

                // Meta & Titles
                document.title = page.pageTitle;
                if(document.getElementById('meta-title')) document.getElementById('meta-title').content = page.metaTitle;
                if(document.getElementById('meta-desc')) document.getElementById('meta-desc').content = page.metaDescription;
                
                document.getElementById('interviews-title').innerText = page.title;
                document.getElementById('interviews-tagline').innerText = page.tagline;

                // Featured Video (The actual interview player)
                if (page.featuredVideoUrl) {
                    document.getElementById('featured-video-wrap').style.display = 'block';
                    document.getElementById('featured-video-iframe').src = page.featuredVideoUrl;
                }

                // Dynamic List of lower entries (Removed the redundant watch buttons)
                const listContainer = document.getElementById('interview-list');
                listContainer.innerHTML = ''; 

                page.entries.forEach(entry => {
                    const section = document.createElement('section');
                    section.className = 'interview-entry';
                    section.innerHTML = `
                        <span style="color:var(--accent); font-weight:bold; text-transform:uppercase; font-size:12px;">${entry.label}</span>
                        <h3>${entry.title}</h3>
                        <p>${entry.description}</p>
                    `;
                    listContainer.appendChild(section);
                });

            } catch (error) {
                console.error("Error loading Interviews JSON:", error);
            }
        }

        loadInterviews();
    </script>
</body>
</html>
