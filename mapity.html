<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STL Recycling Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #map { 
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet-kml@1.0.5/L.KML.js"></script>

    <script>
        const map = L.map('map', {
            zoomControl: true,
            tap: false
        }).setView([38.627, -90.199], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        function loadRecyclingMap() {
            if (typeof L.KML !== 'function') {
                setTimeout(loadRecyclingMap, 300);
                return;
            }

            fetch('recycling_map.kml')
                .then(res => res.text())
                .then(kmltext => {
                    const parser = new DOMParser();
                    const kml = parser.parseFromString(kmltext, 'text/xml');
                    
                    // --- THE FIX: Force markers to show if they are missing styles ---
                    const track = new L.KML(kml);
                    map.addLayer(track);

                    // If pins still don't show, we manually extract them
                    const placemarks = kml.getElementsByTagName('Placemark');
                    if (track.getLayers().length === 0 && placemarks.length > 0) {
                        console.log("No layers found in KML object, manually placing pins...");
                        for (let i = 0; i < placemarks.length; i++) {
                            const name = placemarks[i].getElementsByTagName('name')[0]?.textContent || "Recycling Bin";
                            const coords = placemarks[i].getElementsByTagName('coordinates')[0]?.textContent.trim().split(',');
                            if (coords && coords.length >= 2) {
                                L.marker([parseFloat(coords[1]), parseFloat(coords[0])])
                                    .addTo(map)
                                    .bindPopup(name);
                            }
                        }
                    }

                    const bounds = track.getBounds();
                    if (bounds.isValid()) {
                        map.fitBounds(bounds);
                    }
                })
                .catch(err => console.error("KML Load Error:", err));
        }

        loadRecyclingMap();
    </script>
</body>
</html>
