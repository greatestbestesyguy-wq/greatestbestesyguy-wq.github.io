<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STL Recycling Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* 2. Fullscreen Reset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents scrollbars */
        }

        #map { 
            height: 100vh; /* 100% of the Viewport Height */
            width: 100vw;  /* 100% of the Viewport Width */
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet-kml@1.0.5/L.KML.js"></script>

    <script>
        // Initialize Map
        const map = L.map('map', {
            zoomControl: true,
            tap: false // Helps with mobile interaction
        }).setView([38.627, -90.199], 11);

        // Add Tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Load KML Function
        function loadRecyclingMap() {
            if (typeof L.KML !== 'function') {
                setTimeout(loadRecyclingMap, 300);
                return;
            }

            fetch('recycling_map.kml')
                .then(res => {
                    if (!res.ok) throw new Error("File not found");
                    return res.text();
                })
                .then(kmltext => {
                    const parser = new DOMParser();
                    const kml = parser.parseFromString(kmltext, 'text/xml');
                    const track = new L.KML(kml);
                    map.addLayer(track);

                    const bounds = track.getBounds();
                    if (bounds.isValid()) {
                        map.fitBounds(bounds);
                    }
                })
                .catch(err => console.error("KML Load Error:", err));
        }

        loadRecyclingMap();
    </script>
</body>
</html>
