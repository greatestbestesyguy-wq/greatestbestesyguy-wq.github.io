<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R1Y5DRSP21"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-R1Y5DRSP21');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="page-title">Recycle St. Louis | About</title>
    <meta name="title" id="meta-title" content="">
    <meta name="description" id="meta-desc" content="">
    
    <meta property="og:type" content="website">
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-desc" content="">
    <meta property="og:image" content="https://stl.planet-recycling.pl/images/screenshot.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="header-placeholder"></div>

        <main>
            <h1 id="about-title">About the Project</h1>
            <p id="about-tagline" class="tagline"></p>

            <section style="text-align: left; max-width: 800px; margin: 0 auto 60px;">
                <h2 id="mission-title" style="color: var(--accent); font-size: 24px;"></h2>
                <div id="mission-body"></div>
            </section>

            <div id="team-grid" class="stats-grid" style="margin-bottom: 60px;">
                </div>

            <section style="text-align: left; max-width: 800px; margin: 0 auto 80px; background: var(--card-bg); padding: 40px; border-radius: 24px; border: 1px solid #222;">
                <h3 id="context-title">Assignment Context</h3>
                <p id="context-details" style="color: var(--text-dim); font-size: 14px; line-height: 1.6;"></p>
                <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
                <p id="context-quote" style="font-style: italic; color: var(--text-dim);"></p>
            </section>
        </main>

        <div id="footer-placeholder"></div>
    </div>

    <script src="script.js"></script>
    <script>
        async function loadAboutData() {
            try {
                const response = await fetch('./content.json');
                const data = await response.json();
                const page = data.aboutPage;

                // Meta & Titles
                document.title = page.pageTitle;
                document.getElementById('meta-title').content = page.metaTitle;
                document.getElementById('meta-desc').content = page.metaDescription;
                document.getElementById('og-title').content = page.metaTitle;
                document.getElementById('og-desc').content = page.metaDescription;

                document.getElementById('about-title').innerText = page.title;
                document.getElementById('about-tagline').innerText = page.tagline;

                // Mission
                document.getElementById('mission-title').innerText = page.missionTitle;
                document.getElementById('mission-body').innerHTML = page.missionBody;

                // Team Grid
                const teamGrid = document.getElementById('team-grid');
                teamGrid.innerHTML = '';
                page.team.forEach(member => {
                    const card = document.createElement('div');
                    card.className = 'stat-card';
                    card.innerHTML = `<h2 style="font-size: 2rem; color: var(--accent);">${member.name}</h2><p>${member.role}</p>`;
                    teamGrid.appendChild(card);
                });

                // Assignment Context
                document.getElementById('context-title').innerText = page.contextTitle;
                document.getElementById('context-details').innerHTML = `
                    <strong>Course:</strong> ${page.contextCourse}<br>
                    <strong>Due Date:</strong> ${page.contextDate}<br>
                    <strong>Focus:</strong> ${page.contextFocus}
                `;
                document.getElementById('context-quote').innerText = page.contextQuote;

            } catch (error) {
                console.error("Error loading About JSON:", error);
            }
        }
        loadAboutData();
    </script>
</body>
</html>
