<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R1Y5DRSP21"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-R1Y5DRSP21');
    </script>

    <!-- Primary Meta Tags -->
    <title>STL Recycling Challenge</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #00ff88;
            --text: #ffffff;
            --dim: #a0a0a0;
            --wrong: #ff4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #quiz-box {
            background: var(--card);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid #222;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }
        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--dim);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        .home-btn:hover { color: var(--accent); }

        .option-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover { border-color: var(--accent); background: #252525; }
        
        .nav-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 14px 34px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        
        #progress-container {
            height: 6px;
            background: #222;
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            margin-bottom: 35px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }
        
        .share-btn {
            background: white;
            color: black;
            border: none;
            padding: 14px 34px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .share-btn:hover { transform: scale(1.02); }

        .discovery-grid {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .discovery-card {
            background: #1e1e1e;
            padding: 15px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .discovery-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .discovery-card span { font-size: 14px; color: var(--dim); }
        .discovery-card strong { display: block; font-size: 16px; }

        .badge-icon {
            font-size: 60px;
            margin-bottom: 10px;
            display: block;
        }
        .share-incentive {
            background: rgba(0, 255, 136, 0.05);
            border: 1px dashed var(--accent);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="quiz-box">
    <a href="index.html" class="home-btn">← Home</a>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="display"></div>
</div>

<script>
    const data = [
        { q: "Is a greasy pizza box recyclable in STL?", a: "No", info: "Grease ruins paper. Recycle only the clean lid!" },
        { q: "Can plastic bags go in blue bins?", a: "No", info: "They jam sorting machines. Return them to grocery stores." },
        { q: "Do you need to rinse out food jars?", a: "Yes", info: "Residue contaminates batches. Give it a quick scrub!" },
        { q: "Should you leave the caps on plastic bottles?", a: "Yes", info: "Keep them on! Modern machines capture them better that way." },
        { q: "Is shredded paper okay for the blue bin?", a: "No", info: "Small bits fall through equipment. Compost it instead." },
        { q: "Can you recycle mirrors or lightbulbs in the bin?", a: "No", info: "This glass has different melting points and ruins the batch." },
        { q: "Are aluminum cans infinitely recyclable?", a: "Yes", info: "Aluminum never loses quality no matter how many times it's reused!" },
        { q: "Does STL currently have curbside pickup city-wide?", a: "No", info: "Most residents must use drop-off stations." }
    ];
    let idx = 0;
    let score = 0;

    function render() {
        const item = data[idx];
        document.getElementById('progress-bar').style.width = `${(idx / data.length) * 100}%`;
        document.getElementById('display').innerHTML = `
            <p style="color:var(--dim)">Question ${idx + 1} of ${data.length}</p>
            <h2 style="margin-bottom: 30px;">${item.q}</h2>
            <button class="option-btn" onclick="check('Yes')">Yes</button>
            <button class="option-btn" onclick="check('No')">No</button>
        `;
    }

    window.check = (choice) => {
        const correct = choice === data[idx].a;
        if (correct) score++;
        document.getElementById('display').innerHTML = `
            <h2 style="color:${correct ? 'var(--accent)' : 'var(--wrong)'}">${correct ? '✓ Correct!' : '✗ Incorrect'}</h2>
            <p style="margin: 20px 0; line-height: 1.5;">${data[idx].info}</p>
            <button class="nav-btn" onclick="next()">Continue</button>
        `;
    };

    window.next = () => {
        idx++;
        if (idx < data.length) render();
        else showResults();
    };

    function showResults() {
        document.getElementById('progress-bar').style.width = '100%';
        let rank = "";
        let icon = "";
        
        if (score >= 7) {
            rank = "Recycling Legend";
            icon = "👑";
        } else if (score >= 5) {
            rank = "Sustainability Scholar";
            icon = "🌱";
        } else {
            rank = "Waste Warrior";
            icon = "🛡️";
        }

        document.getElementById('display').innerHTML = `
            <span class="badge-icon">${icon}</span>
            <h1 style="color:var(--accent); margin-bottom: 5px;">${rank}</h1>
            <p style="font-size: 1.2rem; margin-bottom: 10px;">You scored ${score} / ${data.length}</p>
            
            <div class="share-incentive">
                <strong>Help save STL recycling!</strong><br>
                Share your score to challenge your friends and help stop bin contamination in our city.
            </div>

            <button class="share-btn" onclick="share()">📣 Share My Rank & Challenge Friends</button>

            <div class="discovery-grid">
                <p style="color:var(--dim); font-size: 14px; margin-bottom: 5px; text-align: center;">Keep Exploring</p>
                <a href="map.html" class="discovery-card">
                    <div>
                        <strong>Find a Drop-Off</strong>
                        <span>Locate your nearest station</span>
                    </div>
                    <span>→</span>
                </a>
                <a href="interviews.html" class="discovery-card">
                    <div>
                        <strong>Watch Interviews</strong>
                        <span>Hear from Mayor Cara Spencer</span>
                    </div>
                    <span>→</span>
                </a>
                <a href="index.html" class="nav-btn" style="text-align: center; margin-top: 10px;">Return Home</a>
            </div>
        `;
    }

    window.share = () => {
        const rank = score >= 7 ? "Recycling Legend" : score >= 5 ? "Sustainability Scholar" : "Waste Warrior";
        const text = `I just earned the ${rank} rank on the STL Recycling Challenge (${score}/${data.length})! Can you beat my score and help save our city's recycling? ♻️`;
        
        if (navigator.share) {
            navigator.share({ title: 'Recycle STL Challenge', text: text, url: window.location.href });
        } else {
            const el = document.createElement('textarea');
            el.value = text + " " + window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const btn = document.querySelector('.share-btn');
            btn.innerText = "✓ Score & Challenge Copied!";
            setTimeout(() => btn.innerText = "📣 Share My Rank & Challenge Friends", 2000);
        }
    };

    render();
</script>
</body>
</html>
