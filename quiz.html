<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL Recycling Quiz</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #00ff88;
            --text: #ffffff;
            --dim: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #quiz-box {
            background: var(--card);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid #222;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .option-btn:hover { border-color: var(--accent); }

        .nav-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            margin-top: 20px;
        }

        #progress {
            height: 4px;
            background: #222;
            width: 100%;
            margin-bottom: 30px;
        }

        #bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
        }
    </style>
</head>
<body>

<div id="quiz-box">
    <div id="progress"><div id="bar"></div></div>
    <div id="display"></div>
</div>

<script>
    const data = [
        { q: "Is a greasy pizza box recyclable in STL?", a: "No", info: "Grease ruins the paper fibers. Trash it!" },
        { q: "Can you put plastic bags in city bins?", a: "No", info: "They jam the machines. Take them to a store!" },
        { q: "Should you leave caps on plastic bottles?", a: "Yes", info: "Keep them on to ensure the small plastic is captured." }
    ];

    let idx = 0;
    let score = 0;

    function render() {
        const item = data[idx];
        document.getElementById('bar').style.width = `${(idx / data.length) * 100}%`;
        document.getElementById('display').innerHTML = `
            <h2 style="color:var(--accent)">Question ${idx + 1}</h2>
            <p>${item.q}</p>
            <button class="option-btn" onclick="check('Yes')">Yes</button>
            <button class="option-btn" onclick="check('No')">No</button>
        `;
    }

    window.check = (choice) => {
        const correct = choice === data[idx].a;
        if (correct) score++;
        document.getElementById('display').innerHTML = `
            <h2 style="color:${correct ? '#00ff88' : '#ff4444'}">${correct ? 'Correct!' : 'Wrong'}</h2>
            <p>${data[idx].info}</p>
            <button class="nav-btn" onclick="next()">Continue</button>
        `;
    };

    window.next = () => {
        idx++;
        if (idx < data.length) render();
        else {
            document.getElementById('bar').style.width = '100%';
            document.getElementById('display').innerHTML = `
                <h2>Final Score: ${score}/${data.length}</h2>
                <a href="index.html" class="nav-btn">Back to Site</a>
            `;
        }
    };

    render();
</script>

</body>
</html>
