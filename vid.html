<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleek Pro Player</title>
    <style>
        :root { --yt-red: #ff0000; }
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        .video-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            user-select: none;
            touch-action: none; /* Crucial for mobile scrubbing */
        }

        video { width: 100%; height: 100%; pointer-events: none; }

        .controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 25px 15px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }

        .video-container:hover .controls, 
        .video-container.paused .controls, 
        .video-container.scrubbing .controls { opacity: 1; }

        /* Draggable Scrubber */
        .progress-area { 
            height: 4px; background: rgba(255,255,255,0.2); 
            cursor: pointer; display: flex; align-items: center; 
            margin-bottom: 12px; position: relative;
            transition: height 0.1s;
        }
        .video-container.scrubbing .progress-area, .progress-area:hover { height: 6px; }

        .progress-bar { height: 100%; background: var(--yt-red); width: 0%; position: relative; pointer-events: none; }
        
        .scrub-handle {
            position: absolute; right: -7px; top: 50%; transform: translateY(-50%);
            width: 14px; height: 14px; background: var(--yt-red); border-radius: 50%;
            scale: 0; transition: scale 0.1s;
        }
        .progress-area:hover .scrub-handle, .video-container.scrubbing .scrub-handle { scale: 1; }

        .bottom-controls { display: flex; align-items: center; justify-content: space-between; }
        .left-side, .right-side { display: flex; align-items: center; gap: 20px; }
        
        .icon-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; }
        .icon-btn svg { width: 26px; height: 26px; fill: white; stroke: white; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5)); }

        /* Mobile Ripple Effect */
        .ripple {
            position: absolute; top: 0; width: 40%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 5; color: white; font-size: 12px;
        }
        .ripple.left { left: 0; border-radius: 0 100% 100% 0; }
        .ripple.right { right: 0; border-radius: 100% 0 0 100%; }
    </style>
</head>
<body>

<div class="video-container paused" id="player">
    <video id="main-video" playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <div class="ripple left" id="ripple-l"><span>⏪ 5s</span></div>
    <div class="ripple right" id="ripple-r"><span>5s ⏩</span></div>

    <div class="controls">
        <div class="progress-area" id="progress-area">
            <div class="progress-bar" id="progress-bar">
                <div class="scrub-handle"></div>
            </div>
        </div>
        
        <div class="bottom-controls">
            <div class="left-side">
                <button class="icon-btn" id="play-pause">
                    <svg id="p-icon" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
                </button>
                <button class="icon-btn" id="mute">
                    <svg id="m-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
            </div>
            <div class="right-side">
                <button class="icon-btn" id="fullscreen">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const video = document.getElementById('main-video');
    const playPauseBtn = document.getElementById('play-pause');
    const pIcon = document.getElementById('p-icon');
    const progressArea = document.getElementById('progress-area');
    const progressBar = document.getElementById('progress-bar');
    const fsBtn = document.getElementById('fullscreen');
    const mBtn = document.getElementById('mute');

    let isDragging = false;

    // Core: Toggle Play/Pause
    function togglePlay() {
        if (video.paused) {
            video.play();
            player.classList.remove('paused');
            pIcon.innerHTML = '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>';
        } else {
            video.pause();
            player.classList.add('paused');
            pIcon.innerHTML = '<path d="M5 3l14 9-14 9V3z"/>';
        }
    }

    // Keyboard Support (Space & Arrows)
    window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        
        if (e.code === 'Space' || e.key === ' ') {
            e.preventDefault();
            togglePlay();
        }
        if (e.key === 'ArrowRight') video.currentTime += 5;
        if (e.key === 'ArrowLeft') video.currentTime -= 5;
    });

    // Prevent double-clicking buttons with Space
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => btn.blur());
    });

    // Scrubbing Logic
    function updateScrub(e) {
        const rect = progressArea.getBoundingClientRect();
        let pageX = e.pageX || (e.touches ? e.touches[0].pageX : 0);
        let x = pageX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const perc = x / rect.width;
        progressBar.style.width = (perc * 100) + '%';
        video.currentTime = perc * video.duration;
    }

    progressArea.addEventListener('pointerdown', (e) => {
        isDragging = true;
        player.classList.add('scrubbing');
        updateScrub(e);
    });

    window.addEventListener('pointermove', (e) => {
        if (isDragging) updateScrub(e);
    });

    window.addEventListener('pointerup', () => {
        isDragging = false;
        player.classList.remove('scrubbing');
    });

    video.addEventListener('timeupdate', () => {
        if (!isDragging) {
            const perc = (video.currentTime / video.duration) * 100;
            progressBar.style.width = perc + '%';
        }
    });

    // Mobile Double Tap Seek
    let lastTap = 0;
    player.addEventListener('touchstart', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
            const rect = player.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            if (x < rect.width / 2) {
                video.currentTime -= 5;
                showRipple('ripple-l');
            } else {
                video.currentTime += 5;
                showRipple('ripple-r');
            }
        }
        lastTap = now;
    });

    function showRipple(id) {
        const el = document.getElementById(id);
        el.style.opacity = '1';
        setTimeout(() => el.style.opacity = '0', 400);
    }

    // Fullscreen & Mute
    fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) player.requestFullscreen();
        else document.exitFullscreen();
    });

    mBtn.addEventListener('click', () => {
        video.muted = !video.muted;
        mBtn.innerHTML = video.muted ? 
            '<path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6" stroke="white" stroke-width="2"/>' : 
            '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
    });

    playPauseBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
    player.addEventListener('click', (e) => { if(e.target === player || e.target === video) togglePlay(); });

</script>
</body>
</html>
