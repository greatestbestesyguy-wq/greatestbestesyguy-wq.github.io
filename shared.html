<div id="shared-header">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ff88;
            --dim: #a0a0a0;
        }

        #shared-header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        header nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        header nav a {
            color: var(--dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        /* Desktop specific share button */
        .share-site-link {
            color: var(--accent) !important;
            font-weight: bold;
            border: 1px solid var(--accent);
            padding: 4px 10px;
            border-radius: 5px;
            display: inline-block;
        }

        /* Mobile Notification (Floating Action Button) */
        #mobile-share-toast {
            display: none; /* Hidden by default */
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: #000;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            z-index: 1000;
            cursor: pointer;
            border: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* MOBILE OVERRIDES */
        @media (max-width: 600px) {
            .share-site-link {
                display: none; /* Remove from top bar on mobile */
            }
            #mobile-share-toast {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            header nav {
                gap: 15px;
            }
        }

        #shared-header h2 { 
            font-size: 12px; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            margin: 10px 0 0;
        }
    </style>
    <header>
        <nav aria-label="Main Navigation">
            <a href="/">Home</a>
            <a href="/interviews">Interviews</a>
            <a href="/map">Map</a>
            <a href="/about">About</a>
            <a href="/quiz">Quiz</a>
            <a href="#" onclick="shareCurrentPage(); return false;" class="share-site-link">
               Share Site
            </a>
        </nav>
        <h2>Metro Academic & Classical High School</h2>
    </header>

    <button id="mobile-share-toast" onclick="shareCurrentPage()">
        <span>📢</span> Share Site
    </button>
</div>
