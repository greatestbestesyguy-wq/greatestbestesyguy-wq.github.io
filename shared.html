<div id="shared-header">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ff88;
            --dim: #a0a0a0;
        }
        #shared-header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #222;
        }
        header nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap; /* Allows wrapping without overlap */
        }
        header nav a {
            color: var(--dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        header nav a:hover { color: var(--accent); }

        /* Specific fix for the Share button wrapping */
        .share-site-btn {
            color: var(--accent) !important;
            font-weight: bold;
            border: 1px solid var(--accent);
            padding: 4px 12px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
        }

        #shared-header h2 { 
            font-size: 13px; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin: 15px 0 0;
            display: block; /* Ensures it sits on its own line below nav */
            width: 100%;
        }

        /* Mobile specific layout */
        @media (max-width: 600px) {
            header nav {
                gap: 12px 18px; /* Vertical and horizontal gap */
                padding: 0 10px;
            }
            header nav a {
                font-size: 13px;
            }
            .share-site-btn {
                margin-top: 5px; /* Adds space if the button wraps to a third line */
            }
            #shared-header h2 {
                font-size: 11px;
                margin-top: 10px;
            }
        }
    </style>
    <header>
        <nav aria-label="Main Navigation">
            <a href="/">Home</a>
            <a href="/interviews">Interviews</a>
            <a href="/map">Map</a>
            <a href="/about">About</a>
            <a href="/quiz">Quiz</a>
            <a href="#" onclick="shareCurrentPage(); return false;" class="share-site-btn">
               Share Site
            </a>
        </nav>
        <h2>Metro Academic & Classical High School</h2>
    </header>
</div>

<script>
function shareCurrentPage() {
    const text = "Check out the Recycle St. Louis advocacy project! ♻️";
    const url = window.location.origin;
    if (navigator.share) {
        navigator.share({ title: 'Recycle STL', text: text, url: url });
    } else {
        const el = document.createElement('textarea');
        el.value = text + " " + url;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Link copied to clipboard!");
    }
}
</script>
